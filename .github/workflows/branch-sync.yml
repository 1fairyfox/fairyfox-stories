# branch-sync — guard that `dev` never drifts behind `main`.
#
# The git-workflow release flow requires "after any release, dev must contain main"
# (hub/standards/git-workflow.md). This CI guard catches a skipped back-merge within a
# day instead of at the next release: it fails whenever `main` has any commit not in `dev`.

name: branch-sync

on:
  schedule:
    - cron: "0 6 * * *"   # daily; catches drift within a day
  workflow_dispatch: {}
  push:
    branches: [main]      # re-check right after a release

permissions:
  contents: read

jobs:
  dev-contains-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: dev must contain every commit on main
        # The back-merge legitimately lands a few seconds AFTER the merge to main, so on a
        # push trigger this job starts while `dev` is still one commit behind by design.
        # Retry with backoff before failing; a genuinely skipped back-merge is still caught
        # (it just takes ~2.5 min to say so), and the scheduled run is unaffected.
        run: |
          for attempt in 1 2 3 4 5 6; do
            git fetch --quiet origin main dev
            behind="$(git rev-list --count origin/dev..origin/main)"
            if [ "$behind" -eq 0 ]; then
              echo "dev contains main (0 commits behind). OK."
              exit 0
            fi
            echo "attempt $attempt/6: dev is $behind commit(s) behind main; waiting for the back-merge…"
            [ "$attempt" -lt 6 ] && sleep 30
          done
          echo "::error::dev is missing $behind commit(s) that are on main — the release back-merge was skipped."
          git log --oneline origin/dev..origin/main
          exit 1
